<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lagarto</title>
</head>
<body>
    <style>
        body {
            margin: 60px;
            background-color: rgb(209, 205, 199);
         }

         .card1 {
            width: 1140px;
            margin-top: 60px;
            margin-right: 20px;
            margin-bottom: 60px;
            margin-left: 20px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
            background-color: red;
         }

         .card2 {
              margin: 20px 0 20px 0;
              border-top-left-radius: 10px;
              border-top-right-radius: 10px;
              border-bottom-right-radius: 10px;
              border-bottom-left-radius: 10px;
              background-color: blue;
         }

         .card3 {
          margin-top: 15px;
          margin-right: 20px;
          margin-bottom: 15px;
          margin-left: 20px;
          border-top-left-radius: 10px;
          border-top-right-radius: 10px;
          border-bottom-right-radius: 10px;
          border-bottom-left-radius: 10px;
          background-color: dimgrey;
         }

         .grid-container {
            margin-top: 30px;
            margin-right: 30px;
            margin-bottom: 30px;
            margin-left: 30px;
            width: 1000px;
         }

         .grid-inner {
            width: 1000px;
            font-size: 0;
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 20px;
            margin-left: 20px;
         }

         .grid-inner > img {
            display: inline-block;
            vertical-align: top;
            margin: 0 20px 20px 0;
         }

         .grid-inner > img:nth-child(3n) {
            margin-right: 0;
         }

         .fig {
            width: 320px;
            height: 180px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
            border-bottom-left-radius: 15px;
            display: block;
         }

  </style>

    <div class="card1">
        <div class="card2">
            <div class="card3">
                <div class="grid-container">
                    <div class="grid-inner">
                        <img src="Sonic.jpeg" alt="Sonic" class="fig">
                        <img src="Darwin.jpeg" alt="Darwin" class="fig">
                        <img src="Finn.jpeg" alt="Finn" class="fig">
                        <img src="Gohan.jpeg" alt="Gohan" class="fig">
                        <img src="Shadow.jpeg" alt="Shadow" class="fig">
                        <img src="Gumball.jpeg" alt="Gumball" class="fig">
                        <img src="Muscoloso.jpeg" alt="Muscoloso" class="fig">
                        <img src="CharlieBrown.jpeg" alt="Charlie Brown" class="fig">
                        <img src="Fantasmao.jpeg" alt="Fantasmao" class="fig">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
