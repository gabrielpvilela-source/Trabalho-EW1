<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homem-Aranha</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 900px;
            padding: 20px 0;
            display: flex;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        nav a {
            color: #ff0000;
            font-size: 24px;
            text-decoration: underline;
            font-weight: bold;
            margin-right: 40px;
        }

        h1 {
            color: #ff0000;
            font-size: 32px;
            margin-top: 10px;
            margin-bottom: 25px;
            text-align: center;
            width: 900px;
        }

        h2 {
            color: #ff3333;
            font-size: 28px;
            font-weight: normal;
            margin-top: 25px;
            margin-bottom: 25px;
            text-align: center;
            width: 900px;
        }

        .banner-container {
            width: 900px;
            display: flex;
            justify-content: center;
        }

        .banner-img {
            width: 900px;
            height: 300px;
            display: block;
        }

        .galeria {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            width: 900px;
        }

        .card {
            background-color: #d1d5db;
            padding: 12px;
            border-radius: 20px;
            width: 220px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">Sobre</a>
    </nav>

    <h1>Homem-Aranha!!!!</h1>

    <div class="banner-container">
        <img src="https://i0.wp.com/cloud.estacaonerd.com/wp-content/uploads/2021/09/09180323/spider-man-remastered-new-peter-parker-ps5-details-f_s3xn.jpg?fit=2048%2C1152&ssl=1" class="banner-img" alt="Banner Homem-Aranha">
    </div>

    <h2>Homem-Aracnídeo</h2>

    <div class="galeria">
        <div class="card">
            <img src="https://disneyplusbrasil.com.br/wp-content/uploads/2025/12/Homem-Aranha-Tobey-Maguire.jpg" alt="Homem-Aranha 1">
        </div>
        <div class="card">
            <img src="https://cdn.awsli.com.br/2500x2500/1982/1982647/produto/116252546/captura-de-tela-2024-03-06-114843-ntap5dv947.png" alt="Homem-Aranha 2">
        </div>
        <div class="card">
            <img src="https://www.sonypictures.com.br/sites/brazil/files/2022-03/HA1_KEY%20ART.JPG" alt="Homem-Aranha 3">
        </div>
    </div>

</body>
</html>
