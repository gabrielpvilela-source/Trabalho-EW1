<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma - Lord Farquaad</title>
    <style>

        body {
            background-color: #22FFED; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Josefin Sans', sans-serif;
        }

        
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 20px;
            max-width: 1000px;
            padding: 40px;
            align-items: center; 
        }

        
        .titulo {
            grid-column: 1 / -1; 
            color: #000000;
            font-family: 'Irish Grover', system-ui;
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
        }

        /
        .texto {
            color: #ECFD0A;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 32px;
            margin: 0;
            line-height: 1.2;
            font-weight: bold;
        }

       
        .imagem-lord {
            width: 400px;
            height: auto;
            border-radius: 20px;
            display: block;
            margin: 0 auto;
          
            border: 2px solid #000; 
        }

       
        .botao-voltar {
            grid-column: 1;
            color: #000;
            font-family: 'Irish Grover', cursive;
            font-size: 24px;
            text-transform: uppercase;
            margin-top: 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Título -->
        <h1 class="titulo">Lord Farquaad</h1>

        <div class="parte-texto">
            <p class="texto">
                Farquaad é conhecido por sua personalidade arrogante e tirânica, e por sua paixão por controlar todos ao seu redor. Ele é um personagem complexo, que combina elementos de vilão clássico com uma certa profundidade psicológica.
            </p>
            <div class="botao-voltar">
                VOLTAR a <br> HOME
            </div>
        </div>

        <!-- Lado Direito: Apenas a Imagem -->
        <div class="parte-imagem">
            <!-- Lembre-se: o arquivo deve estar na pasta img ou mude o src -->
            <img src="Farquaad.jpg" alt="Lord Farquaad" class="imagem-lord">
        </div>
    </div>

</body>
</html>
