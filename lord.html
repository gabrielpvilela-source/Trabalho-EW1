<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma - Lord Farquaad</title>
    <style>
        /* Importando as fontes que você definiu */
        @import url('https://fonts.googleapis.com/css2?family=Irish+Grover&family=Josefin+Sans:wght@400;700&display=swap');

        body {
            background-color: #22FFED; /* O fundo ciano que você escolheu */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Josefin Sans', sans-serif;
        }

        /* O Card principal que envolve tudo */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Divide em duas colunas: texto e imagem */
            gap: 20px;
            max-width: 1000px;
            padding: 40px;
            align-items: center; /* Alinha o conteúdo verticalmente */
        }

        /* Título ocupando o topo das duas colunas */
        .titulo {
            grid-column: 1 / -1; /* Faz o título atravessar as duas colunas */
            color: #000000;
            font-family: 'Irish Grover', system-ui;
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Estilo do texto (Amarelo) */
        .texto {
            color: #ECFD0A;
            font-family: 'Josefin Sans', sans-serif;
            font-size: 32px;
            margin: 0;
            line-height: 1.2;
            font-weight: bold;
        }

        /* Estilo da Imagem - Sem o fundo preto atrás */
        .imagem-lord {
            width: 400px;
            height: auto;
            border-radius: 20px;
            display: block;
            margin: 0 auto;
            /* Se quiser uma borda fina na foto: */
            border: 2px solid #000; 
        }

        /* Estilo do botão voltar */
        .botao-voltar {
            grid-column: 1;
            color: #000;
            font-family: 'Irish Grover', cursive;
            font-size: 24px;
            text-transform: uppercase;
            margin-top: 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Título -->
        <h1 class="titulo">Lord Farquaad</h1>

        <!-- Lado Esquerdo: Texto e Botão -->
        <div class="parte-texto">
            <p class="texto">
                Farquaad é conhecido por sua personalidade arrogante e tirânica, e por sua paixão por controlar todos ao seu redor. Ele é um personagem complexo, que combina elementos de vilão clássico com uma certa profundidade psicológica.
            </p>
            <div class="botao-voltar">
                VOLTAR a <br> HOME
            </div>
        </div>

        <!-- Lado Direito: Apenas a Imagem -->
        <div class="parte-imagem">
            <!-- Lembre-se: o arquivo deve estar na pasta img ou mude o src -->
            <img src="Farquaad.jpg" alt="Lord Farquaad" class="imagem-lord">
        </div>
    </div>

</body>
</html>
